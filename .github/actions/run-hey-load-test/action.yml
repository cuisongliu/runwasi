name: "Run hey load test"
description: "Composite action to run hey load test"

inputs:
  github-token:
    description: "GitHub token"
    required: true

runs:
  using: "composite"
  steps:
    - name: Install hey
      shell: bash
      # rakyll/hey used to ship a Linux binary at
      # https://hey-release.s3.us-east-2.amazonaws.com/hey_linux_amd64 but
      # that bucket now returns an XML error page, which the previous
      # implementation happily chmod+x'd and executed. rakyll/hey publishes
      # no binary assets on its GitHub releases, so we build from the
      # tagged source tarball instead. The tarball is fetched with `curl
      # -fL` (fail loudly on non-2xx) and its sha256 is verified against a
      # pinned digest so a future tampered or replaced archive aborts the
      # job instead of silently feeding garbage into `go build`.
      run: |
        set -euo pipefail
        HEY_VERSION="v0.1.4"
        HEY_TARBALL_SHA256="944097e62dd0bd5012d3b355d9fe2e7b7afcf13cc0b2c06151e0f4c2babfc279"
        workdir="$(mktemp -d)"
        trap 'rm -rf "$workdir"' EXIT
        curl -fL --retry 5 --retry-all-errors \
          -o "$workdir/hey-src.tar.gz" \
          "https://github.com/rakyll/hey/archive/refs/tags/${HEY_VERSION}.tar.gz"
        echo "${HEY_TARBALL_SHA256}  $workdir/hey-src.tar.gz" | sha256sum -c -
        tar -xzf "$workdir/hey-src.tar.gz" -C "$workdir"
        (cd "$workdir/hey-${HEY_VERSION#v}" && go build -trimpath -o "$workdir/hey" .)
        file "$workdir/hey" | grep -q "ELF .* executable"
        sudo install -m 0755 "$workdir/hey" /usr/local/bin/hey
        hey -h 2>&1 | head -1 || true
    - name: Run hey benchmark
      shell: bash
      run: |
        hey -n 100000 -c 50 http://127.0.0.1:8080 > raw-output.txt
        python3 ./scripts/parse-hey.py raw-output.txt
        cat latency_results.json
        cat throughput_results.json
    - name: Report Throughput results
      uses: benchmark-action/github-action-benchmark@v1.20.4
      with:
        name: "HTTP Throughput"
        tool: "customBiggerIsBetter"
        output-file-path: throughput_results.json
        github-token: ${{ inputs.github-token }}
        auto-push: ${{ github.event_name == 'schedule' }}
        summary-always: true
        alert-threshold: "130%"
        fail-on-alert: ${{ github.event_name == 'schedule' }}
    - name: Report Latency results
      if : ${{ github.event_name == 'schedule' }}
      uses: benchmark-action/github-action-benchmark@v1.20.4
      with:
        name: "HTTP Latency"
        tool: "customSmallerIsBetter"
        output-file-path: latency_results.json
        github-token: ${{ inputs.github-token }}
        auto-push: true
        summary-always: true
        alert-threshold: "130%"
        fail-on-alert: true
    
    # If the event is not a schedule, we'd run into a problem of the failed `git fetch` command,
    # which attempts to update the local `gh-pages` branch with changes from the remote repository 
    # but failed because the update is non-fast-forward. It failed because the previous step
    # `benchmark-action/github-action-benchmark` has already committed the changes to the local, so
    # it creates a conflict with the remote repository.
    # 
    # The workaround is to use the `external-data-json-path` option to tell the action to not 
    # attempt to update the local `gh-pages` branch.
    - name: Report Latency results
      if : ${{ github.event_name != 'schedule' }}
      uses: benchmark-action/github-action-benchmark@v1.20.4
      with:
        name: "HTTP Latency"
        tool: "customSmallerIsBetter"
        output-file-path: latency_results.json
        github-token: ${{ inputs.github-token }}
        summary-always: true
        alert-threshold: "130%"
        fail-on-alert: false
        external-data-json-path: ./cache/latency_results.json